<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Spesa Famiglia">
  <title>Spesa Famiglia</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginScreen"></div>

  <!-- APP -->
  <div id="appScreen"></div>
  <!-- TOUR OVERLAY -->
<div id="tourOverlay">
  <svg id="tourSvgMask" width="100%" height="100%">
    <defs>
      <mask id="tourMask">
        <rect x="0" y="0" width="100%" height="100%" fill="black"></rect>
        <rect id="holeRect" x="0" y="0" width="0" height="0" rx="12" ry="12" fill="white"></rect>
      </mask>
    </defs>
    <rect x="0" y="0" width="100%" height="100%" fill="rgba(0,0,0,0.75)" mask="url(#tourMask)"></rect>
  </svg>

  <div id="tourBubble" class="tour-bubble">
    <div class="tour-step-badge" id="tourBadge"></div>
    <h4 id="tourTitle"></h4>
    <p id="tourDesc"></p>
    <div class="tour-btns">
      <div id="tourDots" class="tour-dots"></div>
      <button class="tour-btn-skip" onclick="chiudiTour()">Salta</button>
      <button id="tourNextBtn" class="tour-btn-next" onclick="tourNext()">Successivo →</button>
    </div>
  </div>

  <div id="tourArrow" class="tour-arrow-icon">👆</div>
</div>


  <!-- JS -->
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/ui.js"></script>

</body>
</html>
